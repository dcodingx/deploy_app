# =============================================================================
# Nginx config for the JUMP SERVER (public-facing)
# Place at: /etc/nginx/sites-available/voicebot
# Enable:   sudo ln -s /etc/nginx/sites-available/voicebot /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# Traffic flow:
#   Internet → Jump Server (nginx :443) → App Server (private IP)
#     /             → Next.js  APP_SERVER_PRIVATE_IP:3000
#     /bot/         → Pipecat  APP_SERVER_PRIVATE_IP:5000   (HTTP + WebSocket)
#
# Replace:
#   DOMAIN              — your public domain (e.g. ai-server-nexs.dcodingx.in)
#   APP_SERVER_PRIVATE_IP — internal IP of the app server (e.g. 192.168.1.100)
# =============================================================================

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name DOMAIN;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name DOMAIN;

    # --- SSL (Let's Encrypt — run certbot to populate these) ---
    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Next.js frontend (all routes except /bot/) ---
    location / {
        proxy_pass         http://APP_SERVER_PRIVATE_IP:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Pipecat bot API + Twilio WebSocket (/bot/dial, /bot/twiml, /bot/ws) ---
    location /bot/ {
        proxy_pass         http://APP_SERVER_PRIVATE_IP:5000;
        proxy_http_version 1.1;

        # WebSocket upgrade — required for Twilio media stream (/bot/ws)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Twilio media streams are long-lived — increase timeouts
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
