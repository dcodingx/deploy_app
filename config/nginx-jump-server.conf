# =============================================================================
# Nginx config for the JUMP SERVER (public-facing, behind AWS ALB)
# Place at: /etc/nginx/conf.d/voicebot.conf   (RHEL/Amazon Linux)
#           /etc/nginx/sites-available/voicebot (Ubuntu)
#
# SSL is terminated at the AWS ALB — this server only listens on HTTP :80.
# ALB forwards traffic with X-Forwarded-Proto: https header.
#
# Traffic flow:
#   cps.denaipoc.sproutsandbox.com → CPaaS ALB (HTTPS) → this Nginx :80 → App :5000 (bot)
#   mgn.denaipoc.sproutsandbox.com → Dashboard ALB (HTTPS) → this Nginx :80 → App :3000 (Next.js)
#
# Replace:
#   APP_SERVER_PRIVATE_IP — internal IP of the app server (e.g. 192.168.1.100)
# =============================================================================

# ── CPaaS — Pipecat bot + Twilio WebSocket ────────────────────────────────────
server {
    listen 80;
    server_name cps.denaipoc.sproutsandbox.com;

    # ALB health check endpoint
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # All bot routes (/bot/dial, /bot/twiml, /bot/ws)
    location / {
        proxy_pass         http://APP_SERVER_PRIVATE_IP:5000;
        proxy_http_version 1.1;

        # WebSocket upgrade — required for Twilio media stream (/bot/ws)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Pass through the original proto from ALB (https)
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;

        # Twilio media streams are long-lived — increase timeouts
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

# ── Dashboard — Next.js frontend ─────────────────────────────────────────────
server {
    listen 80;
    server_name mgn.denaipoc.sproutsandbox.com;

    # ALB health check endpoint
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass         http://APP_SERVER_PRIVATE_IP:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }
}
